name: Deploy to JustRunMyApp (git push)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Checks out your repo into the runner workspace
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to JustRunMyApp Git remote (triggers deploy)
        env:
          JRNM_GIT_URL: ${{ secrets.JRMA_GIT_REPO }}
        run: |
          # Push the current commit directly to the remote URL's deploy branch
          git push -u "$JRNM_GIT_URL" HEAD:deploy
          
